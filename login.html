<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录/注册 - 速买商城</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="top-bar">
    <div class="container">
        <span>速买商城 - 综合性网上购物平台</span>
        <div>
            <a href="index.html">返回首页</a>
        </div>
    </div>
</div>

<div class="auth-page">
    <div class="auth-container">
        <div class="auth-tabs">
            <div class="tab active" onclick="switchTab('login')">登 录</div>
            <div class="tab" onclick="switchTab('register')">注 册</div>
        </div>

        <!-- Login Form -->
        <div class="auth-form active" id="loginForm">
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="loginUser" placeholder="请输入用户名" required autocomplete="username">
                    <div class="error-msg" id="loginUserError">请输入用户名</div>
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="loginPass" placeholder="请输入密码" required autocomplete="current-password">
                    <div class="error-msg" id="loginPassError">请输入密码</div>
                </div>
                <button type="submit" class="btn btn-primary">登 录</button>
            </form>
            <p style="text-align:center;margin-top:18px;font-size:13px;color:var(--text-muted);">
                提示：首次使用请先注册账号
            </p>
        </div>

        <!-- Register Form -->
        <div class="auth-form" id="registerForm">
            <form onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="regUser" placeholder="4-16位字母或数字" required minlength="4" maxlength="16" pattern="[a-zA-Z0-9]{4,16}" autocomplete="off">
                    <div class="error-msg" id="regUserError">用户名需4-16位字母或数字</div>
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="regPass" placeholder="至少6位字符" required minlength="6" autocomplete="new-password">
                    <div class="error-msg" id="regPassError">密码长度不能少于6位</div>
                </div>
                <div class="form-group">
                    <label>确认密码</label>
                    <input type="password" id="regPassConfirm" placeholder="再次输入密码" required autocomplete="new-password">
                    <div class="error-msg" id="regPassConfirmError">两次输入的密码不一致</div>
                </div>
                <button type="submit" class="btn btn-primary">注 册</button>
            </form>
        </div>
    </div>
</div>

<script src="js/main.js"></script>
<script>
function switchTab(tab) {
    document.querySelectorAll('.auth-tabs .tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));

    if (tab === 'login') {
        document.querySelector('.auth-tabs .tab:first-child').classList.add('active');
        document.getElementById('loginForm').classList.add('active');
    } else {
        document.querySelector('.auth-tabs .tab:last-child').classList.add('active');
        document.getElementById('registerForm').classList.add('active');
    }
}

if (window.location.hash === '#register') {
    switchTab('register');
}

function validateLogin(username, password) {
    let valid = true;
    if (!username || username.trim().length === 0) {
        document.getElementById('loginUserError').style.display = 'block';
        valid = false;
    } else {
        document.getElementById('loginUserError').style.display = 'none';
    }
    if (!password || password.length === 0) {
        document.getElementById('loginPassError').style.display = 'block';
        valid = false;
    } else {
        document.getElementById('loginPassError').style.display = 'none';
    }
    return valid;
}

function validateRegister(username, password, passwordConfirm) {
    let valid = true;
    const userRegex = /^[a-zA-Z0-9]{4,16}$/;
    if (!userRegex.test(username)) {
        document.getElementById('regUserError').style.display = 'block';
        valid = false;
    } else {
        document.getElementById('regUserError').style.display = 'none';
    }
    if (!password || password.length < 6) {
        document.getElementById('regPassError').style.display = 'block';
        valid = false;
    } else {
        document.getElementById('regPassError').style.display = 'none';
    }
    if (password !== passwordConfirm) {
        document.getElementById('regPassConfirmError').style.display = 'block';
        valid = false;
    } else {
        document.getElementById('regPassConfirmError').style.display = 'none';
    }
    return valid;
}

function handleLogin(e) {
    e.preventDefault();
    const username = document.getElementById('loginUser').value.trim();
    const password = document.getElementById('loginPass').value;

    if (!validateLogin(username, password)) return;

    const result = loginUser(username, password);
    if (result.success) {
        showToast('登录成功！');
        setTimeout(() => { location.href = 'index.html'; }, 800);
    } else {
        showToast(result.message);
    }
}

function handleRegister(e) {
    e.preventDefault();
    const username = document.getElementById('regUser').value.trim();
    const password = document.getElementById('regPass').value;
    const passwordConfirm = document.getElementById('regPassConfirm').value;

    if (!validateRegister(username, password, passwordConfirm)) return;

    const result = registerUser(username, password);
    if (result.success) {
        showToast('注册成功！请登录');
        switchTab('login');
        document.getElementById('loginUser').value = username;
    } else {
        showToast(result.message);
    }
}
</script>
</body>
</html>
