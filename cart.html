<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>购物车 - 速买商城</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="top-bar">
    <div class="container">
        <span>速买商城 - 综合性网上购物平台</span>
        <div>
            <a href="index.html">首页</a>
            <a href="profile.html">个人中心</a>
        </div>
    </div>
</div>

<header class="header">
    <div class="container">
        <a href="index.html" class="logo">速买<span>【李钧涛 24215220129】</span></a>
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="搜索商品、品牌、分类...">
            <button onclick="doSearch()">搜索</button>
        </div>
        <div class="header-icons">
            <a href="cart.html" style="position:relative;">
                <span class="icon">🛒</span>购物车
                <span class="cart-count">0</span>
            </a>
        </div>
    </div>
</header>

<div class="cart-page">
    <div class="section-title">我的购物车</div>

    <!-- Cart Items -->
    <div id="cartContent"></div>
</div>

<!-- Back to Top -->
<button class="back-to-top" id="backToTop" onclick="scrollToTop()" title="回到顶部">↑</button>

<script src="js/main.js"></script>
<script>
function renderCart() {
    const cart = getCart();
    const container = document.getElementById('cartContent');

    if (cart.length === 0) {
        container.innerHTML = `
            <div class="cart-empty">
                <div class="empty-icon">🛒</div>
                <p style="color:var(--text-secondary);font-size:16px;font-weight:500;">购物车还是空的</p>
                <p style="color:var(--text-muted);font-size:13px;margin-top:8px;">快去挑选心仪的商品吧~</p>
                <a href="index.html" class="btn btn-primary" style="display:inline-block;width:auto;margin-top:24px;padding:12px 36px;">去逛逛</a>
            </div>
        `;
        return;
    }

    let html = `<table class="cart-table">
        <thead>
            <tr>
                <th style="width:90px;">商品</th>
                <th>名称</th>
                <th>单价</th>
                <th>数量</th>
                <th>小计</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody>`;

    let total = 0;
    cart.forEach(item => {
        const product = getProduct(item.id);
        if (!product) return;
        const subtotal = product.price * item.quantity;
        total += subtotal;
        html += `
            <tr>
                <td class="cart-item-img">
                    <img src="${product.img}" alt="${product.name}" onerror="this.style.display='none'">
                    ${product.emoji}
                </td>
                <td class="cart-item-name">${product.name}</td>
                <td class="cart-item-price">${formatPrice(product.price)}</td>
                <td>
                    <button class="cart-qty-btn" onclick="updateQty(${item.id}, ${item.quantity - 1})">−</button>
                    <input class="cart-qty-input" type="text" value="${item.quantity}" readonly>
                    <button class="cart-qty-btn" onclick="updateQty(${item.id}, ${item.quantity + 1})">+</button>
                </td>
                <td style="color:var(--primary);font-weight:700;font-size:16px;">${formatPrice(subtotal)}</td>
                <td><span class="cart-remove" onclick="removeItem(${item.id})">删除</span></td>
            </tr>
        `;
    });

    html += `</tbody></table>
        <div class="cart-summary">
            <span style="color:var(--text-secondary);">共 <b style="color:var(--text);" id="totalQty">${cart.reduce((s,i) => s+i.quantity, 0)}</b> 件商品</span>
            <span>合计：<span class="total-price">${formatPrice(total)}</span></span>
            <button class="btn-checkout" onclick="goCheckout()">去结算</button>
        </div>`;

    container.innerHTML = html;
}

function updateQty(id, newQty) {
    if (newQty <= 0) {
        removeItem(id);
        return;
    }
    if (newQty > 99) newQty = 99;
    const cart = getCart();
    const item = cart.find(i => i.id === id);
    if (item) {
        item.quantity = newQty;
        saveCart(cart);
        updateCartCount();
        renderCart();
    }
}

function removeItem(id) {
    const cart = getCart().filter(i => i.id !== id);
    saveCart(cart);
    updateCartCount();
    renderCart();
    showToast('已从购物车移除');
}

function goCheckout() {
    const user = getCurrentUser();
    if (!user) {
        showToast('请先登录');
        setTimeout(() => { location.href = 'login.html'; }, 800);
        return;
    }
    location.href = 'checkout.html';
}

function doSearch() {
    const keyword = document.getElementById('searchInput').value.trim();
    if (keyword) {
        location.href = 'index.html?search=' + encodeURIComponent(keyword);
    }
}

function scrollToTop() {
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

window.addEventListener('scroll', () => {
    const btn = document.getElementById('backToTop');
    if (btn) btn.classList.toggle('visible', window.scrollY > 500);
});

document.getElementById('searchInput').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') doSearch();
});

renderCart();
</script>
</body>
</html>
